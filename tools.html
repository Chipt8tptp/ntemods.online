<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><span class="zh-only">工具</span><span class="en-only">Tools</span> - NTE HUB</title>
    <meta name="description" content="NTE实用工具：伤害计算器、配队模拟器、抽卡模拟器。">
    <link rel="canonical" href="https://ntehub.com/tools/">
    <style>
        :root { --bg:#0D1117; --bg2:#161B22; --border:#30363D; --primary:#A259FF; --text:#E6EDF3; --text2:#8B949E; --max:800px; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
        a{color:var(--primary);text-decoration:none;} a:hover{text-decoration:underline;}
        nav{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;}
        .nav-inner{max-width:var(--max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:64px;}
        .logo{font-size:1.8rem;font-weight:800;color:var(--primary);} .logo span{color:var(--text);font-weight:400;}
        .lang-switch{background:var(--border);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:0.85rem;}
        .container{max-width:var(--max);margin:0 auto;padding:20px;}
        .page-header{padding:40px 0 20px;text-align:center;}
        .page-header h1{font-size:2.5rem;color:var(--primary);}
        .breadcrumb{color:var(--text2);font-size:0.9rem;margin-bottom:20px;}
        .tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:24px;margin-top:40px;}
        .tool-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center;transition:0.2s;}
        .tool-card:hover{border-color:var(--primary);}
        .tool-card h3{color:var(--primary);margin-bottom:12px;}
        footer{background:var(--bg2);border-top:1px solid var(--border);padding:30px 20px;margin-top:60px;text-align:center;color:var(--text2);font-size:0.85rem;}
        .lang-zh .en-only{display:none;} .lang-en .zh-only{display:none;}
    </style>
</head>
<body class="lang-zh">
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="logo">NTE<span>HUB</span></a>
            <button class="lang-switch" onclick="toggleLang()"><span class="zh-only">🌐 EN</span><span class="en-only">🌐 中文</span></button>
        </div>
    </nav>
    <main class="container">
        <div class="page-header">
            <p class="breadcrumb"><a href="index.html">Home</a> &raquo; <span class="zh-only">工具</span><span class="en-only">Tools</span></p>
            <h1>🛠️ <span class="zh-only">工具</span><span class="en-only">Tools</span></h1>
            <p><span class="zh-only">实用工具即将上线，敬请期待</span><span class="en-only">Useful tools coming soon.</span></p>
        </div>
        <div class="tools-grid">
            <div class="tool-card"><h3>⚡ <span class="zh-only">伤害计算器</span><span class="en-only">Damage Calculator</span></h3><p><span class="zh-only">模拟输出伤害</span><span class="en-only">Simulate damage output.</span></p></div>
            <div class="tool-card"><h3>👥 <span class="zh-only">配队模拟器</span><span class="en-only">Team Builder</span></h3><p><span class="zh-only">构建最佳队伍</span><span class="en-only">Build optimal teams.</span></p></div>
            <div class="tool-card"><h3>🎲 <span class="zh-only">抽卡模拟器</span><span class="en-only">Gacha Simulator</span></h3><p><span class="zh-only">测试你的运气</span><span class="en-only">Test your luck.</span></p></div>
        </div>
    </main>
    <footer><p>&copy; 2026 NTE HUB.</p></footer>
    <script>
        (function() {
            var savedLang = localStorage.getItem('nte-lang') || 'zh';
            document.body.classList.remove('lang-zh', 'lang-en');
            document.body.classList.add('lang-' + savedLang);
        })();

        function toggleLang() {
            var body = document.body;
            if (body.classList.contains('lang-zh')) {
                body.classList.remove('lang-zh');
                body.classList.add('lang-en');
                localStorage.setItem('nte-lang', 'en');
            } else {
                body.classList.remove('lang-en');
                body.classList.add('lang-zh');
                localStorage.setItem('nte-lang', 'zh');
            }
        }
    </script>
</body>
</html>
